name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linter
        run: python -m pip install --upgrade pip ruff

      - name: Byte-compile sources
        run: python -m compileall downloader.py tools/write_icon.py

      - name: Lint
        run: ruff check . || true
