name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install --upgrade pip ruff pytest

      - name: Byte-compile sources
        run: python -m compileall downloader.py tools/write_icon.py

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: python -m pytest -q
