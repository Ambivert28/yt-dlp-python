name: Build and Release

on:
  push:
    tags:
      - "v*"
    # Temporary: build + publish a downloadable .exe directly from the audit
    # branch so the artifact is available before the PR is merged. This branch
    # disappears after merge, so the trigger is self-cleaning.
    branches:
      - "claude/audit-update-recommendations-42j70w"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Generate application icon
        run: python tools/write_icon.py

      - name: Build standalone executable
        run: python -m PyInstaller --onefile --windowed --icon app.ico --name yt-dlp-downloader downloader.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-downloader-exe
          path: dist/yt-dlp-downloader.exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.2.0' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.2.0' }}
          files: dist/yt-dlp-downloader.exe
          generate_release_notes: true
