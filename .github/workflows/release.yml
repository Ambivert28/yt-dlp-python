name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.3.0)"
        required: true
        default: "1.3.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Stamp release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          python - "$VERSION" <<'PY'
          import re, sys, pathlib
          version = sys.argv[1]
          path = pathlib.Path("downloader.py")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r'"APP_VERSION", "[^"]*"', f'"APP_VERSION", "{version}"', text)
          path.write_text(text, encoding="utf-8")
          print("Stamped version:", version)
          PY

      - name: Generate application icon
        run: python tools/write_icon.py

      - name: Build standalone executable
        run: python -m PyInstaller --onefile --windowed --icon app.ico --name yt-dlp-downloader downloader.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-downloader-exe
          path: dist/yt-dlp-downloader.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          files: dist/yt-dlp-downloader.exe
          generate_release_notes: true
